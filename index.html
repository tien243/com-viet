.hero-actions{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}

.btn-primary{background:#c0392b;color:#fff;box-shadow:0 4px 14px rgba(192,57,43,.3)}

.btn-secondary{background:#fff;color:#2c2420;border:2px solid #d5c8bd}

.tab-btn:hover{background:#faf7f2}
.tab-btn.active{background:#c0392b;color:#fff}
.tab-content{display:none}
.tab-content.active{display:block}
.search-wrap{position:relative;margin-bottom:16px}
.search-input{width:100%;padding:10px 14px 10px 38px;border:2px solid #d5c8bd;border-radius:12px;font-size:.9rem;font-family:inherit;background:#fff;transition:border-color .2s;outline:none}

.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:1rem;opacity:.6}
.results-area{min-height:200px}

.menu-day-title{font-size:.9rem;font-weight:700;color:#c0392b;margin-bottom:6px}
.menu-grid{display:flex;flex-direction:column;gap:6px}
.dish-row{display:flex;align-items:baseline;gap:8px;padding:7px 12px;background:#faf7f2;border-radius:10px;transition:background .2s}
.dish-row:hover{background:#f0eae2}
.dish-cat{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 10px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.cat-man{background:#fee9e7;color:#c0392b}
.cat-canh{background:#e0f2f1;color:#00897b}
.cat-rau{background:#e8f5e9;color:#388e3c}
.cat-nhau{background:#fef3e0;color:#e67e22}
.dish-name{font-size:1rem;font-weight:600;color:#2c2420}
.dish-desc{font-size:.82rem;color:#7f6b5e;margin-top:2px}
.week-day{border-bottom:1px solid #eee;padding-bottom:14px;margin-bottom:14px}
.week-day:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.menu-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.browse-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}

.browse-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.no-result{padding:30px 0;text-align:center}
.no-result .icon{font-size:3rem;margin-bottom:12px}
.no-result p{color:#7f6b5e;font-size:.95rem;margin-bottom:12px}

.pagination .page-btn{padding:3px 10px;border:1px solid #d5c8bd;border-radius:6px;background:#fff;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;color:#5a4a40;min-width:28px;text-align:center}
.pagination .page-btn:hover{border-color:#c0392b;color:#c0392b}
.pagination .page-btn.active{background:#c0392b;border-color:#c0392b;color:#fff}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2c2420;color:#fff;padding:12px 28px;border-radius:12px;font-size:.9rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:1000}

</div>

const PAGE_SIZE=25;
const catLabel={man:'Món mặn',canh:'Món canh',rau:'Món rau',nhau:'Mồi bén',khac:'Món khác'};
const catClass={man:'cat-man',canh:'cat-canh',rau:'cat-rau',nhau:'cat-nhau',khac:'cat-man'};
const catDot={man:'#c0392b',canh:'#00897b',rau:'#388e3c',nhau:'#e67e22',khac:'#c0392b'};

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function pick(a,n){const s=shuffle(a);return s.slice(0,Math.min(n,s.length))}
function formatDate(d=0){const x=new Date();x.setDate(x.getDate()+d);const dd=String(x.getDate()).padStart(2,'0'),mm=String(x.getMonth()+1).padStart(2,'0'),da=['CN','T2','T3','T4','T5','T6','T7'];return `${da[x.getDay()]}, ${dd}/${mm}`}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._hide);t._hide=setTimeout(()=>t.classList.remove('show'),2200)}
function copyMenu(){const el=document.getElementById('results'),t=el.innerText.trim();if(!t)return;navigator.clipboard.writeText(t).then(()=>showToast('📋 Đã copy!')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('📋 Đã copy!')})}

function renderMenu(title,daysArray,isWeek=false){
  const el=document.getElementById('results');
  if(!daysArray.length){el.innerHTML='<div class="menu-card fade-up"><p style="color:#7f6b5e">Chưa có món.</p></div>';return}
  const dh=daysArray.map((day,idx)=>{
    const items=day.dishes.map(d=>`<div class="dish-row"><span class="dish-cat ${catClass[d.cat]}">${catLabel[d.cat]}</span><div><div class="dish-name">${d.name}</div><div class="dish-desc">${d.desc}</div></div></div>`).join('');
    return `<div class="${isWeek?'week-day':''}">${isWeek?`<div class="menu-day-title">📅 ${day.label}</div>`:''}<div class="menu-grid">${items}</div></div>`;
  }).join('');
  const rb=isWeek?'<button class="btn btn-outline" onclick="genWeek()">🔄 Lại tuần khác</button>':'<button class="btn btn-outline" onclick="genDay()">🔄 Lại món khác</button>';
  el.innerHTML=`<div class="menu-card fade-up"><h2>${title}</h2>${dh}<div class="menu-actions">${rb}<button class="btn btn-outline" onclick="copyMenu()">📋 Copy thực đơn</button></div></div>`;
}

function genDay(){
  const o=[pick(dishes.filter(d=>d.cat==='man'),1)[0],pick(dishes.filter(d=>d.cat==='canh'),1)[0],pick(dishes.filter(d=>d.cat==='rau'),1)[0]].filter(Boolean);
  renderMenu('🍽️ Thực đơn hôm nay',[{label:formatDate(),dishes:o}],false);
}
function genWeek(){
  const days=[];for(let i=0;i<7;i++){days.push({label:formatDate(i),dishes:[pick(dishes.filter(d=>d.cat==='man'),1)[0],pick(dishes.filter(d=>d.cat==='canh'),1)[0],pick(dishes.filter(d=>d.cat==='rau'),1)[0]].filter(Boolean)})}
  renderMenu('📅 Thực đơn cả tuần',days,true);
}

// ── Pagination state ──
let currentPage=1,lastFiltered=[],lastFilter='';
function showAll(filter){
  lastFilter=filter;
  lastFiltered=filter?dishes.filter(d=>d.cat===filter):dishes;
  currentPage=1;
  renderPage();
}
function renderPage(){
  const f=lastFiltered;
  const totalPages=Math.ceil(f.length/PAGE_SIZE);
  if(currentPage>totalPages)currentPage=totalPages||1;
  const start=(currentPage-1)*PAGE_SIZE,end=Math.min(start+PAGE_SIZE,f.length);
  const page=f.slice(start,end);
  const html=page.map(d=>`<div class="browse-item"><span class="browse-dot" style="background:${catDot[d.cat]}"></span><span>${d.name}</span></div>`).join('');
  const pagination=$pagination(totalPages);
  const el=document.getElementById('results');
  el.innerHTML=`<div class="menu-card fade-up"><h2>📖 Tất cả món ăn ${lastFilter?'('+catLabel[lastFilter]+')':''}</h2><p style="font-size:.85rem;color:#7f6b5e;margin-bottom:12px">${f.length} món · trang ${currentPage}/${totalPages}</p><div class="browse-grid">${html}</div>${pagination}</div>`;
}
function $pagination(totalPages){
  if(totalPages<=1)return '';
  let b='';
  if(currentPage>1)b+=`<button class="page-btn" onclick="goPage(${currentPage-1})">‹</button>`;
  const startP=Math.max(1,currentPage-2),endP=Math.min(totalPages,currentPage+2);
  if(startP>1)b+=`<button class="page-btn" onclick="goPage(1)">1</button>${startP>2?'<span class="page-dot">…</span>':''}`;
  for(let i=startP;i<=endP;i++)b+=`<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  if(endP<totalPages)b+=`${endP<totalPages-1?'<span class="page-dot">…</span>':''}<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  if(currentPage<totalPages)b+=`<button class="page-btn" onclick="goPage(${currentPage+1})">›</button>`;
  return `<div class="pagination">${b}</div>`;
}
function goPage(n){
  currentPage=n;
  renderPage();
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── Search with pagination ──
let searchTimer,searchResults=[],searchQuery='';
function searchDishes(query){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    const q=query.toLowerCase().trim();searchQuery=q;
    const activeFilter=document.querySelector('.filter-chip.active')?.dataset.key||'';
    let pool=activeFilter?dishes.filter(d=>d.cat===activeFilter):dishes;
    if(!q){showAll(activeFilter||null);return}
    const hits=pool.filter(d=>d.name.toLowerCase().includes(q)||d.desc.toLowerCase().includes(q));
    if(hits.length){
      searchResults=hits;currentPage=1;
      renderSearchResults();
    } else {
      document.getElementById('results').innerHTML=`<div class="menu-card fade-up"><div class="no-result"><div class="icon">😅</div><p>Không tìm thấy món "<strong>${q}</strong>"</p><button class="btn btn-outline btn-sm" onclick="switchTab('suggest')">📝 Góp ý món này</button></div></div>`;
    }
  },200);
}
function renderSearchResults(){
  const f=searchResults;
  const totalPages=Math.ceil(f.length/PAGE_SIZE);
  if(currentPage>totalPages)currentPage=totalPages||1;
  const start=(currentPage-1)*PAGE_SIZE,end=Math.min(start+PAGE_SIZE,f.length);
  const page=f.slice(start,end);
  const html=page.map(d=>`<div class="dish-row"><span class="dish-cat ${catClass[d.cat]}">${catLabel[d.cat]}</span><div><div class="dish-name">${d.name}</div><div class="dish-desc">${d.desc}</div></div></div>`).join('');
  const pagination=$pagination(totalPages);
  document.getElementById('results').innerHTML=`<div class="menu-card fade-up"><h2>🔍 Kết quả tìm "${searchQuery}"</h2><p style="font-size:.85rem;color:#7f6b5e;margin-bottom:12px">${f.length} món · trang ${currentPage}/${totalPages}</p><div class="menu-grid">${html}</div>${pagination}</div>`;
}
function goSearchPage(n){
  currentPage=n;
  renderSearchResults();
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}

// Override goPage to handle both browse and search
const _origGoPage=goPage;
goPage=function(n){
  if(searchQuery.trim()){goSearchPage(n);return}
  currentPage=n;renderPage();
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
};

// ── Tabs ──
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(tab==='menu'&&i===0)||(tab==='nhau'&&i===1)||(tab==='suggest'&&i===2)||(tab==='feature'&&i===3)));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  if(tab==='menu'||tab==='nhau'){document.getElementById('tab-menu').classList.add('active');if(tab==='nhau')setFilter('nhau');else setFilter('');}
  else document.getElementById('tab-'+tab).classList.add('active');
}

// ── Submit Forms ──
async function submitDish(e){
  e.preventDefault();
  const btn=e.target.querySelector('button[type=submit]');
  btn.disabled=true;btn.textContent='⏳ Đang gửi...';
  const data={name:document.getElementById('dishSubmitter').value,dishName:document.getElementById('dishName').value,category:catLabel[document.getElementById('dishCat').value]||document.getElementById('dishCat').value,description:document.getElementById('dishDesc').value};
  try{
    const r=await fetch('/api/suggest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'dish',data})});
    const j=await r.json();
    if(j.ok){showFormSuccess('tab-suggest','🎉','Cảm ơn bạn! Món ăn đã được gửi cho bố.')}
    else showToast('❌ Lỗi: '+JSON.stringify(j));
  }catch(err){showToast('❌ Lỗi kết nối. Thử lại sau.')}
  btn.disabled=false;btn.textContent='📤 Gửi góp ý';
}
async function submitFeature(e){
  e.preventDefault();
  const btn=e.target.querySelector('button[type=submit]');
  btn.disabled=true;btn.textContent='⏳ Đang gửi...';
  const data={name:document.getElementById('featureSubmitter').value,title:document.getElementById('featureTitle').value,description:document.getElementById('featureDesc').value};
  try{
    const r=await fetch('/api/suggest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'feature',data})});
    const j=await r.json();
    if(j.ok){showFormSuccess('tab-feature','💡','Cảm ơn bạn! Ý tưởng đã được gửi cho bố.')}
    else showToast('❌ Lỗi: '+JSON.stringify(j));
  }catch(err){showToast('❌ Lỗi kết nối. Thử lại sau.')}
  btn.disabled=false;btn.textContent='📤 Gửi đề xuất';
}
function showFormSuccess(tabId,icon,msg){
  document.getElementById(tabId).innerHTML=`<div class="menu-card fade-up"><div class="form-success"><div class="icon">${icon}</div><p>${msg}</p><button class="btn btn-outline btn-sm" style="margin-top:14px" onclick="resetForm('${tabId}')">✏️ Gửi tiếp</button></div></div>`;
}
function resetForm(tabId){location.reload()}

// ── Stats & Filters ──
function initUI(){
  const counts={man:0,canh:0,rau:0,nhau:0};dishes.forEach(d=>{if(d.cat==='man'||d.cat==='canh'||d.cat==='rau'||d.cat==='nhau')counts[d.cat]++});
  document.getElementById('stats').innerHTML=`<span class="stat-item">🍖 Món mặn <span class="num">${counts.man}</span></span><span class="stat-item">🥣 Món canh <span class="num">${counts.canh}</span></span><span class="stat-item">🥬 Món rau <span class="num">${counts.rau}</span></span><span class="stat-item">🍻 Mồi bén <span class="num">${counts.nhau}</span></span>`;
  document.getElementById('filters').innerHTML=[{key:'',label:'Tất cả'},{key:'man',label:'🍖 Món mặn'},{key:'canh',label:'🥣 Món canh'},{key:'rau',label:'🥬 Món rau'},{key:'nhau',label:'🍻 Mồi bén'}].map(f=>`<button class="filter-chip${f.key===''?' active':''}" data-key="${f.key}" onclick="setFilter('${f.key}')">${f.label}</button>`).join('');
}
let currentFilter='';
function setFilter(key){
  currentFilter=key;
  document.querySelectorAll('.filter-chip').forEach(el=>el.classList.toggle('active',el.dataset.key===key));
  const q=document.getElementById('searchInput').value.trim();
  if(q){searchDishes(q);return}
  showAll(key||null);
}
initUI();
showAll();
</script>
