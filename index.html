<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cơm Bố Nấu - Thực đơn cho bố vào bếp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;scroll-behavior:smooth}
    body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#faf7f2;color:#2c2420;min-height:100vh}
    .container{max-width:800px;margin:0 auto;padding:0 20px}

    header{text-align:center;padding:20px 0 14px;position:relative}
    .avatar-wrap{margin-bottom:4px;display:flex;justify-content:center}
    .avatar-wrap svg{width:72px;height:72px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.1))}
    header h1{font-size:1.8rem;font-weight:800;color:#2c2420;letter-spacing:-.5px;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
    header h1 .tag-red{color:#c0392b}
    header p{color:#7f6b5e;font-size:.88rem;margin-top:4px;font-weight:500}

    .stats{display:flex;justify-content:center;gap:8px;margin:6px 0 16px;flex-wrap:wrap}
    .stat-item{background:#fff;padding:8px 18px;border-radius:20px;font-size:.85rem;font-weight:600;color:#5a4a40;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .stat-item .num{color:#c0392b}

    .hero-actions{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
    .btn{padding:12px 24px;border:none;border-radius:12px;font-size:.93rem;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
    .btn:active{transform:scale(.97)}
    .btn-primary{background:#c0392b;color:#fff;box-shadow:0 4px 14px rgba(192,57,43,.3)}
    .btn-primary:hover{background:#a93226}
    .btn-secondary{background:#fff;color:#2c2420;border:2px solid #d5c8bd}
    .btn-secondary:hover{border-color:#c0392b;color:#c0392b}
    .btn-outline{background:transparent;color:#7f6b5e;border:2px solid #d5c8bd;padding:10px 18px;font-size:.88rem;border-radius:10px}
    .btn-outline:hover{border-color:#c0392b;color:#c0392b}
    .btn-sm{padding:10px 18px;font-size:.88rem}

    .filters{display:flex;gap:6px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
    .filter-chip{padding:6px 16px;border-radius:24px;border:2px solid #d5c8bd;background:transparent;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;color:#5a4a40;font-family:inherit}
    .filter-chip:hover{border-color:#c0392b}
    .filter-chip.active{background:#c0392b;border-color:#c0392b;color:#fff}

    /* ── Tabs ── */
    .tabs{display:flex;gap:0;margin-bottom:20px;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #eee}
    .tab-btn{flex:1;padding:10px;border:none;background:transparent;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;color:#7f6b5e}
    .tab-btn:hover{background:#faf7f2}
    .tab-btn.active{background:#c0392b;color:#fff}
    .tab-content{display:none}
    .tab-content.active{display:block}

    .search-wrap{position:relative;margin-bottom:16px}
    .search-input{width:100%;padding:10px 14px 10px 38px;border:2px solid #d5c8bd;border-radius:12px;font-size:.9rem;font-family:inherit;background:#fff;transition:border-color .2s;outline:none}
    .search-input:focus{border-color:#c0392b}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:1rem;opacity:.6}

    /* ── Results ── */
    .results-area{min-height:200px}
    .menu-card{background:#fff;border-radius:16px;padding:20px 18px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px}
    .menu-card h2{font-size:1.1rem;font-weight:700;margin-bottom:10px;color:#2c2420}
    .menu-day-title{font-size:.9rem;font-weight:700;color:#c0392b;margin-bottom:6px}
    .menu-grid{display:flex;flex-direction:column;gap:6px}
    .dish-row{display:flex;align-items:baseline;gap:8px;padding:7px 12px;background:#faf7f2;border-radius:10px;transition:background .2s}
    .dish-row:hover{background:#f0eae2}
    .dish-cat{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 10px;border-radius:8px;white-space:nowrap;flex-shrink:0}
    .cat-man{background:#fee9e7;color:#c0392b}
    .cat-canh{background:#e0f2f1;color:#00897b}
    .cat-rau{background:#e8f5e9;color:#388e3c}
    .dish-name{font-size:1rem;font-weight:600;color:#2c2420}
    .dish-desc{font-size:.82rem;color:#7f6b5e;margin-top:2px}
    .week-day{border-bottom:1px solid #eee;padding-bottom:14px;margin-bottom:14px}
    .week-day:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
    .menu-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

    .browse-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
    @media(max-width:500px){.browse-grid{grid-template-columns:1fr}}
    .browse-item{padding:8px 12px;background:#fff;border-radius:10px;font-size:.85rem;display:flex;align-items:center;gap:8px}
    .browse-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

    .no-result{padding:30px 0;text-align:center}
    .no-result .icon{font-size:3rem;margin-bottom:12px}
    .no-result p{color:#7f6b5e;font-size:.95rem;margin-bottom:12px}

    /* ── Suggestion Forms ── */
    .suggest-form{display:flex;flex-direction:column;gap:10px}
    .suggest-form label{font-weight:600;font-size:.85rem;color:#2c2420}
    .suggest-form input,.suggest-form select,.suggest-form textarea{width:100%;padding:9px 12px;border:2px solid #d5c8bd;border-radius:10px;font-size:.88rem;font-family:inherit;background:#fff;transition:border-color .2s;outline:none}
    .suggest-form input:focus,.suggest-form select:focus,.suggest-form textarea:focus{border-color:#c0392b}
    .suggest-form textarea{min-height:100px;resize:vertical}
    .suggest-form .btn{margin-top:4px;align-self:flex-start}
    .form-note{font-size:.82rem;color:#b8a99a;margin-top:4px}
    .form-success{padding:30px;text-align:center;background:#e8f5e9;border-radius:14px;color:#2e7d32}
    .form-success .icon{font-size:3rem;margin-bottom:10px}
    .form-success p{font-weight:600}

    footer{text-align:center;color:#b8a99a;font-size:.82rem;padding:30px 0 40px}

    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .35s ease-out}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2c2420;color:#fff;padding:12px 28px;border-radius:12px;font-size:.9rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:1000}
    .toast.show{opacity:1}
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="avatar-wrap">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="30" y="80" width="60" height="40" rx="8" fill="#4A90D9"/>
        <circle cx="60" cy="48" r="34" fill="#F5D0B0"/>
        <path d="M26 42C26 24 38 16 60 16s34 8 34 26-6 12-6-4c0-16-12-20-28-20S26 22 26 42z" fill="#3D2B1F"/>

        <circle cx="48" cy="48" r="3" fill="#2c2420"/><circle cx="72" cy="48" r="3" fill="#2c2420"/>
        <rect x="38" y="41" width="22" height="16" rx="4" stroke="#3D2B1F" stroke-width="2.5" fill="none"/>
        <rect x="60" y="41" width="22" height="16" rx="4" stroke="#3D2B1F" stroke-width="2.5" fill="none"/>

        <line x1="35" y1="48" x2="38" y2="48" stroke="#3D2B1F" stroke-width="2.5"/>

        <path d="M45 84L48 90l12 2 12-2 3-6z" fill="#c0392b" opacity=".7"/>
      </svg>
    </div>
    <h1><span class="tag-red">Cơm</span> Bố Nấu</h1>
    <p>Thực đơn cho bố — bấm phát vào bếp liền</p>
  </header>

  <div class="stats" id="stats"></div>

  <div class="hero-actions">
    <button class="btn btn-primary" onclick="genDay()">🎲 Thực đơn hôm nay</button>
    <button class="btn btn-secondary" onclick="genWeek()">📅 Thực đơn cả tuần</button>
  </div>

  <!-- Tabs: Thực đơn / Góp ý / Đề xuất -->
  <div class="tabs" id="tabs">
    <button class="tab-btn active" onclick="switchTab('menu')">📖 Thực đơn</button>
    <button class="tab-btn" onclick="switchTab('suggest')">🍽️ Góp ý món</button>
    <button class="tab-btn" onclick="switchTab('feature')">💡 Đề xuất</button>
  </div>

  <!-- Tab: Thực đơn -->
  <div class="tab-content active" id="tab-menu">
    <div class="filters" id="filters" data-active=""></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Tìm món ăn..." oninput="searchDishes(this.value)" autocomplete="off" />
    </div>
    <div class="results-area" id="results"></div>
  </div>

  <!-- Tab: Góp ý món mới -->
  <div class="tab-content" id="tab-suggest">
    <div class="menu-card fade-up">
      <h2>🍽️ Góp ý món ăn</h2>
      <p style="color:#7f6b5e;font-size:.9rem;margin-bottom:16px">Chưa thấy món bạn thích? Gửi cho bố biết nhé!</p>
      <form class="suggest-form" id="dishForm" onsubmit="submitDish(event)">
        <div>
          <label for="dishName">Tên món *</label>
          <input type="text" id="dishName" placeholder="VD: Gà nấu đậu..." required />
        </div>
        <div>
          <label for="dishCat">Danh mục *</label>
          <select id="dishCat" required>
            <option value="">— Chọn danh mục —</option>
            <option value="man">🍖 Món mặn</option>
            <option value="canh">🥣 Món canh</option>
            <option value="rau">🥬 Món rau</option>
            <option value="khac">🍽️ Món khác</option>
          </select>
        </div>
        <div>
          <label for="dishDesc">Mô tả ngắn</label>
          <textarea id="dishDesc" placeholder="Món này nấu thế nào? Gợi ý công thức..."></textarea>
        </div>
        <div>
          <label for="dishSubmitter">Tên bạn</label>
          <input type="text" id="dishSubmitter" placeholder="Để bố biết ơn (không bắt buộc)" />
        </div>
        <button class="btn btn-primary btn-sm" type="submit">📤 Gửi góp ý</button>
      </form>
    </div>
  </div>

  <!-- Tab: Đề xuất tính năng -->
  <div class="tab-content" id="tab-feature">
    <div class="menu-card fade-up">
      <h2>💡 Đề xuất tính năng</h2>
      <p style="color:#7f6b5e;font-size:.9rem;margin-bottom:16px">Bạn muốn web có thêm gì? Góp ý để Cơm Bố Nấu ngày càng ngon hơn!</p>
      <form class="suggest-form" id="featureForm" onsubmit="submitFeature(event)">
        <div>
          <label for="featureTitle">Tiêu đề *</label>
          <input type="text" id="featureTitle" placeholder="VD: Thêm chế độ ăn kiêng, thêm món tráng miệng..." required />
        </div>
        <div>
          <label for="featureDesc">Chi tiết *</label>
          <textarea id="featureDesc" placeholder="Hãy mô tả ý tưởng của bạn một cách chi tiết..." required></textarea>
        </div>
        <div>
          <label for="featureSubmitter">Tên bạn</label>
          <input type="text" id="featureSubmitter" placeholder="Để bố biết ơn (không bắt buộc)" />
        </div>
        <button class="btn btn-primary btn-sm" type="submit">📤 Gửi đề xuất</button>
      </form>
    </div>
  </div>

  <footer>Cơm Bố Nấu &middot; Dành cho các bố thương vợ &hearts;</footer>
</div>
<div class="toast" id="toast"></div>

const catLabel={man:'Món mặn',canh:'Món canh',rau:'Món rau',khac:'Món khác'};
const catClass={man:'cat-man',canh:'cat-canh',rau:'cat-rau',khac:'cat-man'};
const catDot={man:'#c0392b',canh:'#00897b',rau:'#388e3c',khac:'#c0392b'};

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function pick(a,n){const s=shuffle(a);return s.slice(0,Math.min(n,s.length))}
function formatDate(d=0){const x=new Date();x.setDate(x.getDate()+d);const dd=String(x.getDate()).padStart(2,'0'),mm=String(x.getMonth()+1).padStart(2,'0'),da=['CN','T2','T3','T4','T5','T6','T7'];return `${da[x.getDay()]}, ${dd}/${mm}`}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._hide);t._hide=setTimeout(()=>t.classList.remove('show'),2200)}
function copyMenu(){const el=document.getElementById('results'),t=el.innerText.trim();if(!t)return;navigator.clipboard.writeText(t).then(()=>showToast('📋 Đã copy!')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('📋 Đã copy!')})}

function renderMenu(title,daysArray,isWeek=false){
  const el=document.getElementById('results');
  if(!daysArray.length){el.innerHTML='<div class="menu-card fade-up"><p style="color:#7f6b5e">Chưa có món.</p></div>';return}
  const dh=daysArray.map((day,idx)=>{
    const items=day.dishes.map(d=>`<div class="dish-row"><span class="dish-cat ${catClass[d.cat]}">${catLabel[d.cat]}</span><div><div class="dish-name">${d.name}</div><div class="dish-desc">${d.desc}</div></div></div>`).join('');
    return `<div class="${isWeek?'week-day':''}">${isWeek?`<div class="menu-day-title">📅 ${day.label}</div>`:''}<div class="menu-grid">${items}</div></div>`;
  }).join('');
  const rb=isWeek?'<button class="btn btn-outline" onclick="genWeek()">🔄 Lại tuần khác</button>':'<button class="btn btn-outline" onclick="genDay()">🔄 Lại món khác</button>';
  el.innerHTML=`<div class="menu-card fade-up"><h2>${title}</h2>${dh}<div class="menu-actions">${rb}<button class="btn btn-outline" onclick="copyMenu()">📋 Copy thực đơn</button></div></div>`;
}

function genDay(){
  const o=[pick(dishes.filter(d=>d.cat==='man'),1)[0],pick(dishes.filter(d=>d.cat==='canh'),1)[0],pick(dishes.filter(d=>d.cat==='rau'),1)[0]].filter(Boolean);
  renderMenu('🍽️ Thực đơn hôm nay',[{label:formatDate(),dishes:o}],false);
}
function genWeek(){
  const days=[];
  for(let i=0;i<7;i++){days.push({label:formatDate(i),dishes:[pick(dishes.filter(d=>d.cat==='man'),1)[0],pick(dishes.filter(d=>d.cat==='canh'),1)[0],pick(dishes.filter(d=>d.cat==='rau'),1)[0]].filter(Boolean)})}
  renderMenu('📅 Thực đơn cả tuần',days,true);
}

function showAll(filter){
  const f=filter?dishes.filter(d=>d.cat===filter):dishes;
  const html=f.map(d=>`<div class="browse-item"><span class="browse-dot" style="background:${catDot[d.cat]}"></span><span>${d.name}</span></div>`).join('');
  const el=document.getElementById('results');
  el.innerHTML=`<div class="menu-card fade-up"><h2>📖 Tất cả món ăn ${filter?'('+catLabel[filter]+')':''}</h2><p style="font-size:.85rem;color:#7f6b5e;margin-bottom:12px">${f.length} món</p><div class="browse-grid">${html}</div></div>`;
}

// ── Search ──
let searchTimer;
function searchDishes(query){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    const q=query.toLowerCase().trim();
    const results=document.getElementById('results');
    const activeFilter=document.querySelector('.filter-chip.active')?.dataset.key||'';
    let pool=activeFilter?dishes.filter(d=>d.cat===activeFilter):dishes;
    if(!q){showAll(activeFilter||null);return}
    const hits=pool.filter(d=>d.name.toLowerCase().includes(q)||d.desc.toLowerCase().includes(q));
    if(hits.length){
      const html=hits.map(d=>`<div class="dish-row"><span class="dish-cat ${catClass[d.cat]}">${catLabel[d.cat]}</span><div><div class="dish-name">${d.name}</div><div class="dish-desc">${d.desc}</div></div></div>`).join('');
      results.innerHTML=`<div class="menu-card fade-up"><h2>🔍 Kết quả tìm "${query}"</h2><div class="menu-grid">${html}</div></div>`;
    } else {
      results.innerHTML=`<div class="menu-card fade-up"><div class="no-result"><div class="icon">😅</div><p>Không tìm thấy món "<strong>${query}</strong>"</p><button class="btn btn-outline btn-sm" onclick="switchTab('suggest')">📝 Góp ý món này</button></div></div>`;
    }
  },200);
}

// ── Tabs ──
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(tab==='menu'&&i===0)||(tab==='suggest'&&i===1)||(tab==='feature'&&i===2)));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='menu'){currentTab='menu'}
  // Clear form success state if switching away
}

// ── Submit Forms ──
async function submitDish(e){
  e.preventDefault();
  const btn=e.target.querySelector('button[type=submit]');
  btn.disabled=true;btn.textContent='⏳ Đang gửi...';
  const data={name:document.getElementById('dishSubmitter').value,dishName:document.getElementById('dishName').value,category:catLabel[document.getElementById('dishCat').value]||document.getElementById('dishCat').value,description:document.getElementById('dishDesc').value};
  try{
    const r=await fetch('/api/suggest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'dish',data})});
    const j=await r.json();
    if(j.ok){showFormSuccess('tab-suggest','🎉','Cảm ơn bạn! Món ăn đã được gửi cho bố.')}
    else showToast('❌ Lỗi: '+JSON.stringify(j));
  }catch(err){showToast('❌ Lỗi kết nối. Thử lại sau.')}
  btn.disabled=false;btn.textContent='📤 Gửi góp ý';
}
async function submitFeature(e){
  e.preventDefault();
  const btn=e.target.querySelector('button[type=submit]');
  btn.disabled=true;btn.textContent='⏳ Đang gửi...';
  const data={name:document.getElementById('featureSubmitter').value,title:document.getElementById('featureTitle').value,description:document.getElementById('featureDesc').value};
  try{
    const r=await fetch('/api/suggest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'feature',data})});
    const j=await r.json();
    if(j.ok){showFormSuccess('tab-feature','💡','Cảm ơn bạn! Ý tưởng đã được gửi cho bố.')}
    else showToast('❌ Lỗi: '+JSON.stringify(j));
  }catch(err){showToast('❌ Lỗi kết nối. Thử lại sau.')}
  btn.disabled=false;btn.textContent='📤 Gửi đề xuất';
}
function showFormSuccess(tabId,icon,msg){
  const el=document.getElementById(tabId);
  el.innerHTML=`<div class="menu-card fade-up"><div class="form-success"><div class="icon">${icon}</div><p>${msg}</p><button class="btn btn-outline btn-sm" style="margin-top:14px" onclick="resetForm('${tabId}')">✏️ Gửi tiếp</button></div></div>`;
}
function resetForm(tabId){
  location.reload();
}

// ── Stats & Filters ──
function initUI(){
  const counts={man:0,canh:0,rau:0};
  dishes.forEach(d=>counts[d.cat]++);
  document.getElementById('stats').innerHTML=`<span class="stat-item">🍖 Món mặn <span class="num">${counts.man}</span></span><span class="stat-item">🥣 Món canh <span class="num">${counts.canh}</span></span><span class="stat-item">🥬 Món rau <span class="num">${counts.rau}</span></span>`;
  const filters=[{key:'',label:'Tất cả'},{key:'man',label:'🍖 Món mặn'},{key:'canh',label:'🥣 Món canh'},{key:'rau',label:'🥬 Món rau'}];
  document.getElementById('filters').innerHTML=filters.map(f=>`<button class="filter-chip${f.key===''?' active':''}" data-key="${f.key}" onclick="setFilter('${f.key}')">${f.label}</button>`).join('');
}
let currentFilter='',currentTab='menu';
function setFilter(key){
  currentFilter=key;
  document.querySelectorAll('.filter-chip').forEach(el=>el.classList.toggle('active',el.dataset.key===key));
  const q=document.getElementById('searchInput').value.trim();
  if(q){searchDishes(q);return}
  showAll(key||null);
}
initUI();
showAll();
</script>
