<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cơm Bố Nấu - Thực đơn cho bố vào bếp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #faf7f2;
      color: #2c2420;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 32px 0 20px;
      position: relative;
    }
    .avatar-wrap {
      margin-bottom: 8px;
      display: flex;
      justify-content: center;
    }
    .avatar-wrap svg {
      width: 88px;
      height: 88px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.10));
    }
    header h1 {
      font-size: 2.25rem;
      font-weight: 800;
      color: #2c2420;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    header h1 .tag-red { color: #c0392b; }
    header p {
      color: #7f6b5e;
      font-size: 1rem;
      margin-top: 6px;
      font-weight: 500;
    }

    /* ── Stats ── */
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 12px 0 28px;
      flex-wrap: wrap;
    }
    .stat-item {
      background: #fff;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #5a4a40;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .stat-item .num { color: #c0392b; }

    /* ── Hero Action ── */
    .hero-actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 16px 36px;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: #c0392b;
      color: #fff;
      box-shadow: 0 4px 14px rgba(192,57,43,0.3);
    }
    .btn-primary:hover { background: #a93226; }
    .btn-secondary {
      background: #fff;
      color: #2c2420;
      border: 2px solid #d5c8bd;
    }
    .btn-secondary:hover { border-color: #c0392b; color: #c0392b; }
    .btn-outline {
      background: transparent;
      color: #7f6b5e;
      border: 2px solid #d5c8bd;
      padding: 10px 18px;
      font-size: 0.88rem;
      border-radius: 10px;
    }
    .btn-outline:hover { border-color: #c0392b; color: #c0392b; }

    /* ── Category Filter ── */
    .filters {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .filter-chip {
      padding: 8px 20px;
      border-radius: 30px;
      border: 2px solid #d5c8bd;
      background: transparent;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #5a4a40;
      font-family: inherit;
    }
    .filter-chip:hover { border-color: #c0392b; }
    .filter-chip.active {
      background: #c0392b;
      border-color: #c0392b;
      color: #fff;
    }

    /* ── Menu Results ── */
    .results-area {
      min-height: 200px;
    }

    .menu-card {
      background: #fff;
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }
    .menu-card h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: #2c2420;
    }
    .menu-day-title {
      font-size: 1rem;
      font-weight: 700;
      color: #c0392b;
      margin-bottom: 8px;
    }

    .menu-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .dish-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 10px 14px;
      background: #faf7f2;
      border-radius: 12px;
      transition: background 0.2s;
    }
    .dish-row:hover { background: #f0eae2; }
    .dish-cat {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 10px;
      border-radius: 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .cat-man { background: #fee9e7; color: #c0392b; }
    .cat-canh { background: #e0f2f1; color: #00897b; }
    .cat-rau { background: #e8f5e9; color: #388e3c; }
    .dish-name {
      font-size: 1rem;
      font-weight: 600;
      color: #2c2420;
    }
    .dish-desc {
      font-size: 0.82rem;
      color: #7f6b5e;
      margin-top: 2px;
    }
    .week-day {
      border-bottom: 1px solid #eee;
      padding-bottom: 14px;
      margin-bottom: 14px;
    }
    .week-day:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

    /* ── Refresh / Save / Share ── */
    .menu-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    /* ── Browse All ── */
    .browse-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    @media (max-width: 500px) { .browse-grid { grid-template-columns: 1fr; } }
    .browse-item {
      padding: 8px 12px;
      background: #fff;
      border-radius: 10px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .browse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      color: #b8a99a;
      font-size: 0.82rem;
      padding: 30px 0 40px;
    }

    /* ── Smooth animate ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.35s ease-out; }

    /* ── Toaster ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #2c2420;
      color: #fff;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1000;
    }
    .toast.show { opacity: 1; }
  </style>
</head>

// ═══════════════════════════════════════
//   TIỆN ÍCH
// ═══════════════════════════════════════

const catLabel = { man: 'Món mặn', canh: 'Món canh', rau: 'Món rau' };
const catClass = { man: 'cat-man', canh: 'cat-canh', rau: 'cat-rau' };
const catDot  = { man: '#c0392b', canh: '#00897b', rau: '#388e3c' };

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pick(arr, n) {
  const shuffled = shuffle(arr);
  return shuffled.slice(0, Math.min(n, shuffled.length));
}

function formatDate(daysFromNow = 0) {
  const d = new Date();
  d.setDate(d.getDate() + daysFromNow);
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const days = ['CN','T2','T3','T4','T5','T6','T7'];
  return `${days[d.getDay()]}, ${dd}/${mm}`;
}

// ═══════════════════════════════════════
//   RENDER — Dùng cho cả ngày & tuần
// ═══════════════════════════════════════

function renderMenu(title, daysArray, isWeek = false) {
  const el = document.getElementById('results');
  if (!daysArray.length) {
    el.innerHTML = `<div class="menu-card fade-up"><p style="color:#7f6b5e">Chưa có món ăn nào được chọn.</p></div>`;
    return;
  }

  const dayHTML = daysArray.map((day, idx) => {
    const items = day.dishes.map(d => `
      <div class="dish-row">
        <span class="dish-cat ${catClass[d.cat]}">${catLabel[d.cat]}</span>
        <div>
          <div class="dish-name">${d.name}</div>
          <div class="dish-desc">${d.desc}</div>
        </div>
      </div>
    `).join('');

    const menuNote = day.dishes.length < 3
      ? `<div style="margin-top:8px;font-size:0.82rem;color:#b8a99a;font-style:italic">
           ✳️ Nếu thiếu món, bạn có thể bổ sung thêm theo sở thích
         </div>`
      : '';

    return `
      <div class="${isWeek ? 'week-day' : ''}">
        ${isWeek ? `<div class="menu-day-title">📅 ${day.label}</div>` : ''}
        <div class="menu-grid">${items}</div>
        ${menuNote}

      </div>
    `;
  }).join('');

  // Gen lại cho nhanh
  const refreshBtns = isWeek
    ? `<button class="btn btn-outline" onclick="genWeek()">🔄 Lại tuần khác</button>`
    : `<button class="btn btn-outline" onclick="genDay()">🔄 Lại món khác</button>`;

  el.innerHTML = `
    <div class="menu-card fade-up">
      <h2>${title}</h2>
      ${dayHTML}
      <div class="menu-actions">
        ${refreshBtns}
        <button class="btn btn-outline" onclick="copyMenu()">📋 Copy thực đơn</button>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════
//   TẠO THỰC ĐƠN
// ═══════════════════════════════════════

function genDay() {
  const oneOfEach = [
    pick(dishes.filter(d => d.cat === 'man'), 1)[0],
    pick(dishes.filter(d => d.cat === 'canh'), 1)[0],
    pick(dishes.filter(d => d.cat === 'rau'), 1)[0],
  ].filter(Boolean);

  renderMenu('🍽️ Thực đơn hôm nay', [{ label: formatDate(), dishes: oneOfEach }], false);
}

function genWeek() {
  const days = [];
  for (let i = 0; i < 7; i++) {
    const manPick = pick(dishes.filter(d => d.cat === 'man'), 1)[0];
    const canhPick = pick(dishes.filter(d => d.cat === 'canh'), 1)[0];
    const rauPick = pick(dishes.filter(d => d.cat === 'rau'), 1)[0];
    days.push({
      label: formatDate(i),
      dishes: [manPick, canhPick, rauPick].filter(Boolean)
    });
  }
  renderMenu('📅 Thực đơn cả tuần', days, true);
}

// ═══════════════════════════════════════
//   COPY MENU
// ═══════════════════════════════════════

function copyMenu() {
  const el = document.getElementById('results');
  const text = el.innerText.trim();
  if (!text) return;

  navigator.clipboard.writeText(text).then(() => {
    showToast('📋 Đã copy thực đơn!');
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('📋 Đã copy thực đơn!');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._hide);
  t._hide = setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════
//   BROWSE ALL
// ═══════════════════════════════════════

function showAll(filter) {
  const filtered = filter
    ? dishes.filter(d => d.cat === filter)
    : dishes;
  const html = filtered.map(d => `
    <div class="browse-item">
      <span class="browse-dot" style="background:${catDot[d.cat]}"></span>
      <span>${d.name}</span>
    </div>
  `).join('');
  const el = document.getElementById('results');
  el.innerHTML = `
    <div class="menu-card fade-up">
      <h2>📖 Tất cả món ăn ${filter ? '(' + catLabel[filter] + ')' : ''}</h2>
      <p style="font-size:0.85rem;color:#7f6b5e;margin-bottom:12px">${filtered.length} món</p>
      <div class="browse-grid">${html}</div>
    </div>
  `;
}

// ═══════════════════════════════════════
//   STATS & FILTERS
// ═══════════════════════════════════════

function initUI() {
  // Stats
  const counts = { man: 0, canh: 0, rau: 0 };
  dishes.forEach(d => counts[d.cat]++);
  document.getElementById('stats').innerHTML = `
    <span class="stat-item">🍖 Món mặn <span class="num">${counts.man}</span></span>
    <span class="stat-item">🥣 Món canh <span class="num">${counts.canh}</span></span>
    <span class="stat-item">🥬 Món rau <span class="num">${counts.rau}</span></span>
  `;

  // Filters
  const filters = [
    { key: '', label: 'Tất cả' },
    { key: 'man', label: '🍖 Món mặn' },
    { key: 'canh', label: '🥣 Món canh' },
    { key: 'rau', label: '🥬 Món rau' },
  ];
  document.getElementById('filters').innerHTML = filters.map(f =>
    `<button class="filter-chip${f.key === '' ? ' active' : ''}"
       data-key="${f.key}"
       onclick="setFilter('${f.key}')">${f.label}</button>`
  ).join('');
}

let currentFilter = '';

function setFilter(key) {
  currentFilter = key;
  document.querySelectorAll('.filter-chip').forEach(el => {
    el.classList.toggle('active', el.dataset.key === key);
  });
  showAll(key || null);
}

// Init
initUI();
showAll();
</script>
